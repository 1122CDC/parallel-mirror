services:
  - type: web
    name: whm1
    runtime: node
    rootDir: WHM1.0
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: whm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
